<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rent Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      padding: 3rem 2rem;
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h1 { color: #0f172a; margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 32px; font-size: 14px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s ease;
    }
    .btn-owner {
      background: #10b981;
      color: white;
      border: 2px solid #10b981;
    }
    .btn-owner:hover { background: #059669; transform: translateY(-2px); }
    
    .btn-tenant {
      background: transparent;
      color: #10b981;
      border: 2px solid #10b981;
    }
    .btn-tenant:hover { background: #ecfdf5; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Rent Manager</h1>
    <p>Select your portal to log in</p>
    
    <a href="./owner.html" class="btn btn-owner">Owner Login</a>
    <a href="./tenant.html" class="btn btn-tenant">Tenant Login</a>
  </div>
</body>
</html>
